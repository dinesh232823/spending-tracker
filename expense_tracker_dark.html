
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  #app {
    max-width: 420px; margin: 0 auto; min-height: 100vh;
    background: #111111;
    display: flex; flex-direction: column;
    font-family: var(--font-sans);
    color: #f0f0f0;
  }
  .header {
    background: #1a1a1a;
    border-bottom: 0.5px solid #2e2e2e;
    padding: 18px 16px 14px;
    position: sticky; top: 0; z-index: 10;
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .app-title { font-size: 20px; font-weight: 500; color: #f0f0f0; letter-spacing: -0.3px; }
  .date-line { font-size: 12px; color: #666; }
  .total-bar {
    background: #1f1f1f;
    border: 0.5px solid #2e2e2e;
    border-radius: 10px;
    padding: 12px 14px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .total-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
  .total-amount { font-size: 22px; font-weight: 500; color: #fff; }
  .content { flex: 1; padding: 12px 14px 100px; }
  .month-folder {
    border: 0.5px solid #2a2a2a;
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    background: #161616;
  }
  .month-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 13px 14px; cursor: pointer;
    background: #161616;
    transition: background 0.15s;
    user-select: none;
  }
  .month-header:hover { background: #1d1d1d; }
  .month-left { display: flex; align-items: center; gap: 10px; }
  .folder-icon { font-size: 18px; line-height: 1; }
  .month-name { font-size: 15px; font-weight: 500; color: #f0f0f0; }
  .month-count { font-size: 11px; color: #555; margin-top: 2px; }
  .month-right { display: flex; align-items: center; gap: 10px; }
  .month-total { font-size: 14px; font-weight: 500; color: #ccc; }
  .chevron { width: 16px; height: 16px; transition: transform 0.2s; color: #444; }
  .chevron.open { transform: rotate(90deg); }
  .sheet-wrap { display: none; border-top: 0.5px solid #222; }
  .sheet-wrap.open { display: block; }
  .sheet-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .sheet-table thead tr { background: #1c1c1c; }
  .sheet-table th {
    padding: 8px 14px; text-align: left;
    font-weight: 500; font-size: 11px;
    color: #555; border-bottom: 0.5px solid #222;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .sheet-table th:nth-child(2) { text-align: right; }
  .sheet-table th:last-child { text-align: center; width: 48px; }
  .sheet-table td { padding: 10px 14px; border-bottom: 0.5px solid #1e1e1e; color: #d0d0d0; vertical-align: middle; }
  .sheet-table td:nth-child(2) { text-align: right; font-weight: 500; color: #fff; }
  .sheet-table td:last-child { text-align: center; width: 48px; }
  .sheet-table tr:last-child td { border-bottom: none; }
  .sheet-table tr:nth-child(even) td { background: #191919; }
  .item-date { font-size: 11px; color: #555; margin-top: 2px; }
  .del-btn {
    background: none; border: none; cursor: pointer;
    color: #444; padding: 4px; border-radius: 6px;
    transition: color 0.15s, background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .del-btn:hover { color: #e05555; background: rgba(224,85,85,0.12); }
  .sheet-footer {
    display: flex; justify-content: space-between;
    padding: 10px 14px;
    background: #1c1c1c;
    border-top: 0.5px solid #222;
    font-size: 13px; font-weight: 500;
    color: #888;
  }
  .sheet-footer span:last-child { color: #fff; }
  .fab {
    position: fixed; bottom: 28px;
    right: calc(50% - 210px + 16px);
    width: 54px; height: 54px;
    border-radius: 50%;
    background: #f0f0f0;
    color: #111;
    border: none; font-size: 28px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, background 0.15s;
    z-index: 20;
  }
  .fab:hover { background: #fff; transform: scale(1.07); }
  .fab:active { transform: scale(0.95); }
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 30; align-items: flex-end; justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: #1a1a1a;
    border-radius: 18px 18px 0 0;
    border-top: 0.5px solid #2e2e2e;
    padding: 22px 20px 36px;
    width: 100%; max-width: 420px;
  }
  .modal-handle { width: 36px; height: 4px; background: #333; border-radius: 2px; margin: 0 auto 18px; }
  .modal-title { font-size: 16px; font-weight: 500; margin-bottom: 5px; color: #f0f0f0; }
  .modal-hint { font-size: 12px; color: #555; margin-bottom: 16px; }
  .modal-input {
    width: 100%; padding: 12px 14px;
    border: 0.5px solid #2e2e2e;
    border-radius: 10px;
    font-size: 15px;
    color: #f0f0f0;
    background: #111;
    margin-bottom: 12px;
    outline: none;
  }
  .modal-input:focus { border-color: #444; box-shadow: 0 0 0 2px rgba(255,255,255,0.05); }
  .modal-input::placeholder { color: #3a3a3a; }
  .parsed-preview {
    background: #111;
    border: 0.5px solid #222;
    border-radius: 10px;
    padding: 11px 14px;
    margin-bottom: 16px;
    min-height: 44px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .preview-item { font-size: 14px; color: #d0d0d0; }
  .preview-amount { font-size: 16px; font-weight: 500; color: #fff; }
  .preview-hint { font-size: 13px; color: #444; }
  .modal-btns { display: flex; gap: 10px; }
  .btn-cancel {
    flex: 1; padding: 12px;
    border: 0.5px solid #2e2e2e;
    border-radius: 10px;
    background: transparent;
    font-size: 14px; cursor: pointer; color: #666;
  }
  .btn-add {
    flex: 2; padding: 12px;
    border: none; border-radius: 10px;
    background: #f0f0f0;
    color: #111;
    font-size: 14px; font-weight: 500; cursor: pointer;
    transition: background 0.15s;
  }
  .btn-add:hover { background: #fff; }
  .btn-add:disabled { opacity: 0.25; cursor: not-allowed; }
  .empty-state { text-align: center; padding: 56px 16px; color: #444; font-size: 14px; }
  .empty-icon { font-size: 40px; margin-bottom: 14px; opacity: 0.5; }
  .confirm-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 40; align-items: center; justify-content: center;
  }
  .confirm-overlay.open { display: flex; }
  .confirm-box {
    background: #1e1e1e;
    border: 0.5px solid #2e2e2e;
    border-radius: 14px;
    padding: 22px 20px;
    width: 280px;
    text-align: center;
  }
  .confirm-title { font-size: 15px; font-weight: 500; color: #f0f0f0; margin-bottom: 6px; }
  .confirm-sub { font-size: 13px; color: #555; margin-bottom: 20px; }
  .confirm-btns { display: flex; gap: 10px; }
  .btn-no {
    flex: 1; padding: 10px;
    border: 0.5px solid #2e2e2e;
    border-radius: 8px; background: transparent;
    font-size: 14px; cursor: pointer; color: #666;
  }
  .btn-yes {
    flex: 1; padding: 10px;
    border: none; border-radius: 8px;
    background: #e05555; color: #fff;
    font-size: 14px; font-weight: 500; cursor: pointer;
  }
  @media (max-width: 440px) { .fab { right: 16px; } }
</style>

<div id="app">
  <div class="header">
    <div class="header-top">
      <span class="app-title">Expenses</span>
      <span id="today-date" class="date-line"></span>
    </div>
    <div class="total-bar">
      <span class="total-label">3-month total</span>
      <span class="total-amount" id="grand-total">₹0</span>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<button class="fab" id="fab-btn" title="Add expense">+</button>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Add expense</div>
    <div class="modal-hint">Type item name + amount — e.g. "Coffee 120" or "Rent 15000"</div>
    <input class="modal-input" id="expense-input" placeholder="e.g. Groceries 850" autocomplete="off" />
    <div class="parsed-preview" id="preview">
      <span class="preview-hint">Start typing to preview...</span>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" id="cancel-btn">Cancel</button>
      <button class="btn-add" id="add-btn" disabled>Add</button>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title">Delete entry?</div>
    <div class="confirm-sub" id="confirm-sub">This action cannot be undone.</div>
    <div class="confirm-btns">
      <button class="btn-no" id="confirm-no">Cancel</button>
      <button class="btn-yes" id="confirm-yes">Delete</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'expenseTracker_v2';
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
let pendingDeleteId = null;

function getStorageData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}
function saveStorageData(d) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {}
}
function pruneOldData(data) {
  const cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - 3);
  cutoff.setDate(1); cutoff.setHours(0,0,0,0);
  return data.filter(e => new Date(e.date) >= cutoff);
}
function getMonthKey(dateStr) {
  const d = new Date(dateStr);
  return `${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`;
}
function getMonthLabel(key) {
  const [y, m] = key.split('-').map(Number);
  return `${MONTH_NAMES[m]} ${y}`;
}
function parseInput(val) {
  val = val.trim();
  const match = val.match(/^(.+?)\s+([\d,]+(?:\.\d{1,2})?)$/);
  if (!match) return null;
  const item = match[1].trim();
  const amount = parseFloat(match[2].replace(/,/g,''));
  if (!item || isNaN(amount) || amount <= 0) return null;
  return { item, amount };
}
function fmt(n) {
  return '₹' + Math.round(n).toLocaleString('en-IN');
}
function fmtDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-IN', { weekday: 'short', day: '2-digit', month: 'short' });
}

let openMonths = new Set();

function render() {
  const raw = getStorageData();
  const data = pruneOldData(raw);

  const d = new Date();
  document.getElementById('today-date').textContent =
    d.toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'short', year: 'numeric' });

  const grouped = {};
  data.forEach(e => {
    const k = getMonthKey(e.date);
    if (!grouped[k]) grouped[k] = [];
    grouped[k].push(e);
  });

  const sortedKeys = Object.keys(grouped).sort((a,b) => b.localeCompare(a));
  const grandTotal = data.reduce((s,e) => s + e.amount, 0);
  document.getElementById('grand-total').textContent = fmt(grandTotal);

  const content = document.getElementById('content');

  if (sortedKeys.length === 0) {
    content.innerHTML = `<div class="empty-state"><div class="empty-icon">💸</div><div>No expenses yet.<br>Tap + to add your first one.</div></div>`;
    return;
  }

  content.innerHTML = '';
  sortedKeys.forEach(key => {
    const entries = grouped[key].sort((a,b) => new Date(b.date) - new Date(a.date));
    const monthTotal = entries.reduce((s,e) => s + e.amount, 0);
    const isOpen = openMonths.has(key);

    const folder = document.createElement('div');
    folder.className = 'month-folder';

    const hdr = document.createElement('div');
    hdr.className = 'month-header';
    hdr.innerHTML = `
      <div class="month-left">
        <span class="folder-icon">${isOpen ? '📂' : '📁'}</span>
        <div>
          <div class="month-name">${getMonthLabel(key)}</div>
          <div class="month-count">${entries.length} item${entries.length !== 1 ? 's' : ''}</div>
        </div>
      </div>
      <div class="month-right">
        <span class="month-total">${fmt(monthTotal)}</span>
        <svg class="chevron ${isOpen ? 'open' : ''}" viewBox="0 0 16 16" fill="none">
          <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    `;
    hdr.addEventListener('click', () => {
      if (openMonths.has(key)) openMonths.delete(key);
      else openMonths.add(key);
      render();
    });

    const sheet = document.createElement('div');
    sheet.className = `sheet-wrap ${isOpen ? 'open' : ''}`;

    const tbody = document.createElement('tbody');
    entries.forEach(e => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>
          <div style="color:#d0d0d0">${e.item}</div>
          <div class="item-date">${fmtDate(e.date)}</div>
        </td>
        <td>${fmt(e.amount)}</td>
        <td>
          <button class="del-btn" data-id="${e.id}" title="Delete">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
              <path d="M3 4h10M6 4V3h4v1M5 4l.5 9h5L11 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </td>
      `;
      tbody.appendChild(tr);
    });

    sheet.innerHTML = `
      <table class="sheet-table">
        <thead><tr><th>Item</th><th>Amount</th><th></th></tr></thead>
      </table>
    `;
    sheet.querySelector('table').appendChild(tbody);

    const footer = document.createElement('div');
    footer.className = 'sheet-footer';
    footer.innerHTML = `<span>Total</span><span>${fmt(monthTotal)}</span>`;
    sheet.appendChild(footer);

    sheet.querySelectorAll('.del-btn').forEach(btn => {
      btn.addEventListener('click', (ev) => {
        ev.stopPropagation();
        const id = btn.dataset.id;
        const entry = data.find(x => x.id === id);
        pendingDeleteId = id;
        document.getElementById('confirm-sub').textContent =
          entry ? `"${entry.item}" — ${fmt(entry.amount)}` : 'This action cannot be undone.';
        document.getElementById('confirm-overlay').classList.add('open');
      });
    });

    folder.appendChild(hdr);
    folder.appendChild(sheet);
    content.appendChild(folder);
  });
}

document.getElementById('confirm-no').addEventListener('click', () => {
  document.getElementById('confirm-overlay').classList.remove('open');
  pendingDeleteId = null;
});

document.getElementById('confirm-yes').addEventListener('click', () => {
  if (!pendingDeleteId) return;
  let data = getStorageData().filter(e => e.id !== pendingDeleteId);
  saveStorageData(data);
  pendingDeleteId = null;
  document.getElementById('confirm-overlay').classList.remove('open');
  render();
});

const overlay = document.getElementById('overlay');
const input = document.getElementById('expense-input');
const preview = document.getElementById('preview');
const addBtn = document.getElementById('add-btn');

document.getElementById('fab-btn').addEventListener('click', () => {
  overlay.classList.add('open');
  input.value = '';
  preview.innerHTML = '<span class="preview-hint">Start typing to preview...</span>';
  addBtn.disabled = true;
  setTimeout(() => input.focus(), 100);
});
document.getElementById('cancel-btn').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
function closeModal() { overlay.classList.remove('open'); }

input.addEventListener('input', () => {
  const parsed = parseInput(input.value);
  if (parsed) {
    preview.innerHTML = `<span class="preview-item">${parsed.item}</span><span class="preview-amount">${fmt(parsed.amount)}</span>`;
    addBtn.disabled = false;
  } else {
    preview.innerHTML = '<span class="preview-hint">Start typing to preview...</span>';
    addBtn.disabled = true;
  }
});
input.addEventListener('keydown', e => { if (e.key === 'Enter' && !addBtn.disabled) doAdd(); });
addBtn.addEventListener('click', doAdd);

function doAdd() {
  const parsed = parseInput(input.value);
  if (!parsed) return;
  const data = getStorageData();
  const id = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  data.push({ id, item: parsed.item, amount: parsed.amount, date: new Date().toISOString() });
  saveStorageData(data);
  openMonths.add(getMonthKey(new Date().toISOString()));
  closeModal();
  render();
}

render();
</script>
